<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#006b1b",
                    "on-tertiary-fixed-variant": "#005c64",
                    "secondary-container": "#86faac",
                    "on-surface": "#0b361d",
                    "tertiary": "#00656f",
                    "on-error": "#ffefec",
                    "primary-fixed": "#76fb7a",
                    "surface": "#ddffe2",
                    "secondary": "#006a38",
                    "surface-variant": "#acecbb",
                    "on-primary-fixed-variant": "#00691a",
                    "surface-tint": "#006b1b",
                    "on-background": "#0b361d",
                    "on-error-container": "#520c00",
                    "outline": "#568061",
                    "on-primary": "#d1ffc8",
                    "tertiary-fixed": "#11eaff",
                    "on-primary-container": "#005e17",
                    "on-secondary-fixed": "#004a26",
                    "surface-container": "#bef5ca",
                    "primary-container": "#76fb7a",
                    "outline-variant": "#8bb795",
                    "surface-container-low": "#cafdd4",
                    "inverse-surface": "#001206",
                    "surface-dim": "#a0e4b1",
                    "on-tertiary-container": "#005159",
                    "on-surface-variant": "#3b6447",
                    "tertiary-fixed-dim": "#00dbee",
                    "secondary-fixed-dim": "#77eb9f",
                    "error-container": "#f95630",
                    "secondary-fixed": "#86faac",
                    "background": "#ddffe2",
                    "on-secondary-fixed-variant": "#006a38",
                    "surface-container-high": "#b5f0c2",
                    "surface-bright": "#ddffe2",
                    "tertiary-container": "#11eaff",
                    "error": "#b02500",
                    "secondary-dim": "#005c30",
                    "on-tertiary-fixed": "#003d43",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#68ec6e",
                    "on-tertiary": "#d4f9ff",
                    "inverse-on-surface": "#7ba785",
                    "on-secondary-container": "#005f32",
                    "inverse-primary": "#76fb7a",
                    "on-secondary": "#ccffd6",
                    "error-dim": "#b92902",
                    "tertiary-dim": "#005861",
                    "on-primary-fixed": "#00480f",
                    "surface-container-highest": "#acecbb",
                    "primary-dim": "#005d16"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { background-color: #ddffe2; color: #0b361d; font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-header { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #ddffe2; }
        ::-webkit-scrollbar-thumb { background: #006b1b; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#ddffe2]/80 dark:bg-emerald-950/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 shadow-[0px_12px_32px_rgba(11,54,29,0.06)]">
<button class="w-10 h-10 flex items-center justify-center rounded-full active:scale-95 transition-transform duration-200 hover:bg-[#006b1b]/10">
<span class="material-symbols-outlined text-[#006b1b]">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#006b1b]">Create Post</h1>
<button class="bg-[#006b1b] text-[#d1ffc8] px-6 py-2 rounded-full font-headline font-bold text-sm active:scale-95 transition-transform duration-200 shadow-sm">
            Post
        </button>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">
<!-- Category Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="font-headline font-bold text-on-surface text-lg">Category</h2>
<span class="text-xs font-label text-on-surface-variant bg-surface-container-high px-2 py-1 rounded-lg">Required</span>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-on-primary font-label text-sm font-semibold shadow-sm transition-all">Mental Health</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-sm font-medium hover:bg-surface-container-high transition-colors">Meditation</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-sm font-medium hover:bg-surface-container-high transition-colors">Wellness</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-sm font-medium hover:bg-surface-container-high transition-colors">Tips</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-sm font-medium hover:bg-surface-container-high transition-colors">Community</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-sm font-medium hover:bg-surface-container-high transition-colors">News</button>
</div>
</section>
<!-- Anonymity Toggle Card -->
<div class="bg-surface-container-low p-6 rounded-xl flex items-center justify-between shadow-[0px_4px_12px_rgba(11,54,29,0.02)]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl">visibility_off</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">Post Anonymously</h3>
<p class="text-sm text-on-surface-variant font-body">Your identity will be hidden from the community.</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-12 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Input Fields -->
<section class="space-y-6">
<!-- Title Field -->
<div class="space-y-2 group">
<div class="flex justify-between items-center">
<label class="font-headline font-bold text-sm text-on-surface ml-1">Post Title</label>
<span class="text-[10px] font-label text-on-surface-variant">0 / 80</span>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 font-body transition-all" placeholder="Give your post a clear title..." type="text"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Content Field -->
<div class="space-y-2 group">
<label class="font-headline font-bold text-sm text-on-surface ml-1">Content</label>
<div class="relative">
<textarea class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 font-body transition-all resize-none" placeholder="Share your thoughts, questions, or experiences with the collective..." rows="8"></textarea>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
</section>
<!-- Media Attachment Bar (Editorial Style) -->
<section class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 p-4 rounded-xl bg-surface-container-high text-primary font-bold hover:bg-primary-container transition-colors active:scale-95">
<span class="material-symbols-outlined">image</span>
<span class="font-headline text-sm">Add Photo</span>
</button>
<button class="flex items-center justify-center gap-2 p-4 rounded-xl bg-surface-container-high text-primary font-bold hover:bg-primary-container transition-colors active:scale-95">
<span class="material-symbols-outlined">link</span>
<span class="font-headline text-sm">Attach Link</span>
</button>
</section>
<!-- Visual Anchor (Asymmetric Decoration) -->
<div class="relative pt-8 overflow-hidden rounded-xl h-32 w-full bg-gradient-to-br from-primary-container/30 to-surface-container-lowest">
<div class="absolute -right-8 -bottom-8 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<div class="p-6 relative flex items-center justify-between">
<div>
<h4 class="font-headline font-extrabold text-primary">Guidelines</h4>
<p class="text-xs text-on-surface-variant mt-1 max-w-[200px]">Be respectful, stay relevant, and help our community thrive.</p>
</div>
<img alt="Lush green plant" class="w-20 h-20 rounded-full object-cover shadow-lg border-4 border-white transform rotate-6" data-alt="Close up of a vibrant green monstera leaf with soft morning light and tiny dew drops" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTzIlyrVTPzGKLdb7bpW4W0Rswe9KS4NjJ4nUWJ4VkzUAj8U2s901Bb0YmzvHyMuTpifvMmAqeLzMqMV74lIbPjWfzaT0QZYMmh7MBMvFl9fBoP0_AvX0uvCtYbL_C-CN7WAlAH2pEVAzQUfEAyhHvpopJqK99txNRCeMw7-lHy3uJNAdavMB_SzHvZmRV702523vo5sICEUcVQSK_FGTk3-wZPHa-MQjviP2yvPtDJcvS7_fgHCIFxr1XBOTND6zPN8S92zDFDHES"/>
</div>
</div>
</main>
<!-- BottomNavBar -->
</body></html>
